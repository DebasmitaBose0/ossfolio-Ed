      - name: "FEAT: Add OG image for the OSSfolio homepage"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement

          When someone shares the OSSfolio homepage link (ossfolio.qzz.io) on Twitter, LinkedIn, WhatsApp, or Discord, the link preview shows no image. There is no `og:image` set for the site itself, which makes the link look plain and unprofessional.

          ## Proposed Solution

          Create a branded OG image for the OSSfolio homepage and wire it up in the site metadata.

          The image should include:
          - The OSSfolio logo and name
          - A short tagline ("Your open-source identity, beyond GitHub")
          - A clean background using the site's green (#3ecf8e) and white color palette
          - Dimensions: 1200x630px (standard OG image size)

          There are two ways to do this:

          **Option A (simpler) -- static image:**
          Design a 1200x630 PNG, save it as `public/og-image.png`, and reference it in the root layout metadata:
          ```ts
          // src/app/layout.tsx
          openGraph: {
            images: [{ url: '/og-image.png', width: 1200, height: 630 }],
          }
          ```

          **Option B (Next.js native) -- generated image:**
          Create `src/app/opengraph-image.tsx` using Next.js `ImageResponse` to generate the image at build time.

          Option A is the faster path and is recommended for this issue.

          ## Alternatives Considered

          - Skipping the OG image for now (link previews remain plain -- not ideal for a tool meant to showcase people publicly)

          ## Additional Context

          The root layout is at `src/app/layout.tsx`. Check that `metadataBase` is set correctly so Next.js can resolve the absolute URL for the image.

          > Read `DESIGN.md` for the exact color values and logo specs before designing the image.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[FEAT] Add an Open Graph image for the OSSfolio homepage" \
            --label "enhancement" --label "frontend" --label "UI" \
            --label "beginner" --label "elusoc" \
            --body-file /tmp/body.md

