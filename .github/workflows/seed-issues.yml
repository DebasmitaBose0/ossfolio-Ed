name: Create Seed Issues
# Run manually from Actions tab once to seed the issue tracker.
# Running it again will create duplicates -- check before re-running.

on:
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}

    steps:

      - name: Ensure labels exist
        run: |
          gh label create "good first issue" --color "7057ff" --description "Great for first-time contributors" --force --repo "$REPO" || true
          gh label create "bug"              --color "d73a4a" --description "Something isnt working"            --force --repo "$REPO" || true
          gh label create "enhancement"      --color "a2eeef" --description "New feature or improvement"        --force --repo "$REPO" || true
          gh label create "frontend"         --color "0075ca" --description "Related to UI / Next.js"           --force --repo "$REPO" || true
          gh label create "backend"          --color "e4e669" --description "Supabase / API / database"         --force --repo "$REPO" || true
          gh label create "documentation"    --color "0075ca" --description "Additions to docs"                 --force --repo "$REPO" || true
          gh label create "UI"               --color "bfd4f2" --description "Visual / design changes"           --force --repo "$REPO" || true
          gh label create "help wanted"      --color "008672" --description "Open for anyone"                   --force --repo "$REPO" || true
          gh label create "beginner"         --color "2da44e" --description "Good for newcomers"                --force --repo "$REPO" || true
          gh label create "intermediate"     --color "fb8f44" --description "Some experience required"          --force --repo "$REPO" || true
          gh label create "elusoc"           --color "7B2FBE" --description "ELUSOC project submission"         --force --repo "$REPO" || true

      # ── GOOD FIRST ISSUES ────────────────────────────────────────────────────

      - name: "GFI: Add Reviews stat to contribution stats grid"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          The contribution stats grid on the profile page shows Commits, Pull Requests, Issues, and Contributor Score. The Reviews stat is already tracked in the database and used in the score formula, but it is never shown on the profile itself.

          Add a Reviews card to the stats grid so users can see their total review count.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx` (around line 256)
          - Concepts: React, array literals, the existing stats grid layout

          ## Steps to Complete
          1. Open `src/components/profile/ProfileView.tsx`
          2. Find the stats array near the "Contribution stats" heading
          3. Add `{ label: "Reviews", value: stats.totalReviews }` as a new entry in the array
          4. Check that the grid looks correct on a narrow screen (it uses `auto-fit`)

          ## Resources
          - Read `DESIGN.md` before touching any UI -- it has all the color tokens, spacing, and component specs

          ## Definition of Done
          - [ ] A Reviews card appears in the contribution stats grid on any profile page
          - [ ] The grid layout does not break on mobile
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add Reviews stat to the contribution stats grid" \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "GFI: Add heatmap color legend"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          The contribution heatmap uses different shades of green to represent activity levels. There is no legend explaining what the shades mean, so the heatmap is hard to interpret for new visitors.

          Add a small color legend below the heatmap with "Less" and "More" labels and color boxes in between.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx` (heatmap section around line 341)
          - Concepts: React, inline styles, flexbox

          ## Steps to Complete
          1. Open `src/components/profile/ProfileView.tsx`
          2. Find the heatmap rendering block
          3. Below the heatmap grid, add a row with 5 small color boxes (using the same green shades the heatmap uses) and "Less" / "More" text labels on each side
          4. Keep the sizing small and subtle so it does not distract from the chart

          ## Resources
          - Read `DESIGN.md` before touching any UI
          - GitHub's contribution graph is a good reference for the legend layout

          ## Definition of Done
          - [ ] A color legend appears below the heatmap
          - [ ] The legend correctly shows the range from low to high activity
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add a color legend to the contribution heatmap" \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "GFI: Add aria-labels to icon-only links"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          The profile page has several icon-only links (GitHub, Twitter, website). These links have no descriptive text so screen reader users cannot tell where each link goes.

          Add `aria-label` attributes to all icon-only anchor tags on the profile page.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx` (social links around line 100 to 155)
          - Concepts: HTML accessibility, `aria-label`

          ## Steps to Complete
          1. Open `src/components/profile/ProfileView.tsx`
          2. Find all `<a>` tags that only contain an SVG icon with no visible text
          3. Add `aria-label="GitHub profile"`, `aria-label="Website"`, `aria-label="Twitter profile"` etc. to each one
          4. Also check the repo cards and any other icon-only links in the file

          ## Resources
          - MDN docs on aria-label: https://developer.mozilla.org/en-US/docs/Web/Accessibility/ARIA/Attributes/aria-label

          ## Definition of Done
          - [ ] All icon-only links have a descriptive `aria-label` value
          - [ ] A screen reader can identify each link by its label
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add aria-labels to icon-only links on the profile page" \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "beginner" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "GFI: Add empty state for profiles with no repos"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          If a GitHub user has no public repositories, the "Popular repositories" section is completely hidden. There is no message to tell the visitor why nothing appears. A user might think the page failed to load.

          Add a simple empty state message when the repos array is empty.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx` (around line 170)
          - Concepts: React conditional rendering

          ## Steps to Complete
          1. Open `src/components/profile/ProfileView.tsx`
          2. Find the block that checks `repos.length > 0`
          3. Change it to always render the section header, but show a "No public repositories yet" message when the array is empty
          4. Keep the styling consistent with the page (use the same font sizes and colors as other secondary text)

          ## Resources
          - Read `DESIGN.md` for font sizes and color tokens

          ## Definition of Done
          - [ ] A clear message appears when the user has no public repos
          - [ ] The section header still shows
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add empty state when a profile has no public repositories" \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "GFI: Add Copy profile link button"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          Users want to share their OSSfolio profile on their resume or LinkedIn. Right now there is no quick way to copy the link from the profile itself. They have to manually copy from the browser address bar.

          Add a small "Copy link" button on the profile page that copies the profile URL to the clipboard.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx` (profile header section)
          - Concepts: React, `navigator.clipboard.writeText`, button state (`useState`)

          ## Steps to Complete
          1. Open `src/components/profile/ProfileView.tsx`
          2. In the profile header, add a "Copy link" button near the social links row
          3. On click, call `navigator.clipboard.writeText(window.location.href)`
          4. Show "Copied!" as the button label for 2 seconds, then reset it back to "Copy link"

          ## Resources
          - Read `DESIGN.md` for button styles and color tokens

          ## Definition of Done
          - [ ] Clicking the button copies the full profile URL to the clipboard
          - [ ] The button shows "Copied!" feedback for 2 seconds
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add a Copy profile link button on the profile page" \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "GFI: Create placeholder Privacy and Terms pages"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          The footer links to `/privacy` and `/terms`, but both routes return a 404. This looks broken for visitors.

          Create simple placeholder pages for both routes with a short message and a link back to the homepage.

          ## What You Need to Know
          - Relevant files to create: `src/app/privacy/page.tsx` and `src/app/terms/page.tsx`
          - Concepts: Next.js App Router, basic page component

          ## Steps to Complete
          1. Create `src/app/privacy/page.tsx` with a "Privacy Policy" heading and a short placeholder paragraph saying the policy is coming soon
          2. Create `src/app/terms/page.tsx` with a "Terms of Service" heading and a similar placeholder
          3. Add a link back to the homepage on both pages
          4. Wrap both pages with the existing `Navbar` and `Footer` components so they feel consistent with the rest of the site

          ## Resources
          - Look at `src/app/[username]/not-found.tsx` for a simple standalone page reference
          - Read `DESIGN.md` for font sizes and layout specs

          ## Definition of Done
          - [ ] `/privacy` and `/terms` render a page without a 404
          - [ ] Both pages have a header, placeholder copy, and a link back home
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Create placeholder Privacy Policy and Terms of Service pages" \
            --label "good first issue" --label "frontend" --label "UI" \
            --label "beginner" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "GFI: Add total stars stat card"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          The contribution stats grid shows Commits, PRs, Issues, and Contributor Score. Total stars earned across all repos is a meaningful signal that OSSfolio already calculates internally for the score formula. It should be visible on the profile too.

          Add a "Stars earned" card to the contribution stats grid.

          ## What You Need to Know
          - Relevant files:
            - `src/components/profile/ProfileView.tsx` (stats grid around line 256)
            - `src/app/[username]/page.tsx` (where profile data is assembled)
            - `src/lib/score.ts` (shows how totalStars is used in the formula)
          - Concepts: React, props, derived values

          ## Steps to Complete
          1. In `src/app/[username]/page.tsx`, calculate `totalStars` by summing `stargazers_count` across the repos array
          2. Pass `totalStars` as a prop to `ProfileView`
          3. Add a `{ label: "Stars", value: totalStars }` entry to the stats grid in `ProfileView`

          ## Resources
          - Read `DESIGN.md` for card styles

          ## Definition of Done
          - [ ] A "Stars" card appears in the stats grid showing the correct count
          - [ ] No layout regressions on mobile
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add total stars earned to the contribution stats grid" \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "GFI: Add back to top button on profile page"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          Profile pages can get long, especially when a user has many repos, a large tech stack, organizations, and the heatmap. There is no way to quickly scroll back to the top without manually scrolling all the way up.

          Add a "Back to top" button that appears after the user scrolls down a bit and smoothly scrolls back to the top when clicked.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx` or a new small component
          - Concepts: React, `useState`, `useEffect`, `window.scrollY`, `window.scrollTo`

          ## Steps to Complete
          1. Add a `useEffect` that listens to `scroll` events and sets a boolean when the user passes 400px from the top
          2. Render a fixed-position button in the bottom-right corner only when scrolled past that threshold
          3. On click, call `window.scrollTo({ top: 0, behavior: 'smooth' })`
          4. Style it to match the site design -- read `DESIGN.md` for color tokens

          ## Resources
          - Read `DESIGN.md` before adding any UI

          ## Definition of Done
          - [ ] The button appears after scrolling past 400px
          - [ ] Clicking it smoothly scrolls to the top
          - [ ] The button is hidden when already near the top
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add a back to top button on long profile pages" \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "GFI: Add Share on Twitter button"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          After seeing their profile, users want to share it on social media. There is no quick way to do this -- they have to manually copy the URL and write a tweet themselves.

          Add a "Share on X" button on the profile page that opens a pre-filled tweet.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx` (profile header)
          - Concepts: React, `window.open`, Twitter intent URLs

          ## Steps to Complete
          1. Build the tweet text: `"My open source contributor score is [score] on OSSfolio: [profile URL] #opensource"`
          2. Encode it and open `https://twitter.com/intent/tweet?text=...` in a new tab using `window.open`
          3. Add a small button with the X logo near the profile header (next to the "Copy link" button)
          4. Style it consistently with the site -- read `DESIGN.md`

          ## Resources
          - Read `DESIGN.md` for button styles and colors

          ## Definition of Done
          - [ ] Clicking the button opens a pre-filled tweet in a new tab
          - [ ] The tweet includes the profile URL and contributor score
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add a Share on X (Twitter) button on the profile page" \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc" \
            --body-file /tmp/body.md

      # ── BUGS ─────────────────────────────────────────────────────────────────

      - name: "BUG: Footer Privacy and Terms links are 404"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          The footer contains links to `/privacy` and `/terms`. Clicking either link takes the user to a 404 page. No route exists for these paths.

          ## Steps to Reproduce
          1. Go to the homepage or any profile page
          2. Scroll to the footer
          3. Click "Privacy" or "Terms"

          ## Expected Behavior

          A Privacy Policy or Terms of Service page loads.

          ## Actual Behavior

          A 404 not found page is shown.

          ## Environment
          - Any browser, any OS

          ## Additional Context

          Footer links are defined in `src/components/layout/Footer.tsx`. The routes `/privacy` and `/terms` need to be created in the Next.js app directory. Placeholder content is fine for now.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[BUG] Footer Privacy and Terms links return 404" \
            --label "bug" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "BUG: Clicking backdrop behind auth modal does not close it"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          When the auth modal is open, pressing Escape closes it. But clicking on the dark backdrop behind the modal does nothing. Users universally expect clicking outside a modal to dismiss it.

          ## Steps to Reproduce
          1. Click "Sign in" in the navbar
          2. When the modal opens, click anywhere on the dark overlay outside the modal box

          ## Expected Behavior

          The modal closes.

          ## Actual Behavior

          The modal stays open. Nothing happens.

          ## Environment
          - Tested on Chrome, Windows 11

          ## Additional Context

          The modal is at `src/components/auth/AuthModal.tsx`. The ESC key listener is already in place (around line 22). The fix is to add an `onClick` handler on the backdrop element that calls `onClose()`. Make sure `stopPropagation()` is called on the inner modal box so clicks inside it do not bubble up and close the modal.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[BUG] Clicking outside the auth modal does not close it" \
            --label "bug" --label "frontend" --label "UI" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "BUG: /explore is a stub but footer still links to it"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          The footer links "Leaderboard" to `/explore`. The explore page at that route shows a "coming soon" placeholder. Visitors who click the link expect real content, not a stub.

          ## Steps to Reproduce
          1. Go to the homepage
          2. Scroll to the footer
          3. Click "Leaderboard" under the Product section

          ## Expected Behavior

          Either a working leaderboard loads, or the link is hidden with a visual "coming soon" indicator so users know it is not ready.

          ## Actual Behavior

          The page loads with just a heading saying "Leaderboard and contributor search -- coming soon."

          ## Environment
          - Any browser, any OS

          ## Additional Context

          The footer is at `src/components/layout/Footer.tsx` and the explore page is at `src/app/explore/page.tsx`. Quick fix: add a "(coming soon)" badge next to the link text, or remove the link until the leaderboard is built.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[BUG] /explore page is a stub but the footer links to it as a real feature" \
            --label "bug" --label "frontend" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "BUG: Heatmap disclaimer text is confusing"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          The contribution heatmap shows generated (not real) daily contribution data. The disclaimer below it reads: "Activity graph is a representative placeholder -- precise daily counts require GitHub's authenticated API."

          This is developer language. Most users will not understand what "representative placeholder" or "authenticated API" means. Some may think the heatmap is showing their real data.

          ## Steps to Reproduce
          1. Visit any public profile page
          2. Scroll to the "Contribution activity" section
          3. Read the small note below the heatmap

          ## Expected Behavior

          The note is written in plain language so any visitor understands that the chart is an estimate.

          ## Actual Behavior

          The note uses technical terms that are unclear to non-developer visitors.

          ## Environment
          - Any browser, any OS

          ## Additional Context

          The disclaimer is in `src/components/profile/ProfileView.tsx` around line 370. Replace it with something like: "This chart shows an estimate of contribution activity. Exact daily counts are not available for public profiles."
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[BUG] Heatmap disclaimer text is confusing and uses technical jargon" \
            --label "bug" --label "frontend" --label "UI" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "BUG: No error state when GitHub rate limit is hit"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          The profile page fetches data from the GitHub REST API without authentication. GitHub limits unauthenticated requests to 60 per hour per IP. When that limit is hit, the page silently fails with empty or missing sections and no explanation.

          ## Steps to Reproduce
          1. Exceed 60 GitHub API requests in an hour from the same IP (or simulate by temporarily using an invalid URL)
          2. Visit any profile page

          ## Expected Behavior

          A clear message like "GitHub data is temporarily unavailable. Please try again in a few minutes." appears on the page.

          ## Actual Behavior

          The page renders with empty sections (no repos, no stats) and gives no feedback about what went wrong.

          ## Environment
          - Any browser, any OS

          ## Additional Context

          The GitHub fetch functions are in `src/app/[username]/page.tsx`. They check `if (!res.ok)` but silently return `null` or `[]`. The fix is to detect a 403 or 429 status from GitHub and surface a user-friendly error message on the page instead of rendering empty sections.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[BUG] No error message shown when GitHub API rate limit is hit on profile page" \
            --label "bug" --label "frontend" --label "backend" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "BUG: Score briefly shows 0 before stored value loads"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          On the profile page, the Contributor Score card shows "0" for a brief moment before the correct score appears. This happens because the Supabase score loads asynchronously after the initial render. Seeing 0 is confusing and looks like a bug to the user.

          ## Steps to Reproduce
          1. Visit your own profile page or any profile with a stored score
          2. Watch the Contributor Score card as the page loads

          ## Expected Behavior

          Either the score loads without a flash (using a skeleton/loading state), or the stored score is included in the server render so it is available immediately.

          ## Actual Behavior

          The score card shows "0" briefly, then updates to the correct number.

          ## Environment
          - Tested on Chrome, Windows 11

          ## Additional Context

          The Supabase score fetch is in `src/app/[username]/page.tsx`. A quick fix is to show dashes or a skeleton in the score card while waiting, instead of defaulting to 0. A fuller fix is to include the Supabase score in the initial server-side render so it is available on first paint.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[BUG] Contributor score briefly flashes 0 before the stored value loads" \
            --label "bug" --label "frontend" --label "backend" --label "elusoc" \
            --body-file /tmp/body.md

      # ── FEATURES ─────────────────────────────────────────────────────────────

      - name: "FEAT: Add /score-explained page"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement

          Users see their Contributor Score on their profile but have no idea what it means or how it is calculated. This makes the score feel arbitrary and reduces trust in it.

          ## Proposed Solution

          Add a `/score-explained` page that explains the formula in plain language:

          | Activity | Points |
          |---|---|
          | Commit | 1 pt |
          | Pull Request | 3 pts |
          | Issue | 2 pts |
          | Code Review | 2 pts |
          | Star earned (capped at 1,000) | 0.1 pt |

          The page should also explain what the score measures, what it does not measure, and how it will evolve over time. Add a link to this page from the Contributor Score card on the profile so users can click through to understand their number.

          ## Alternatives Considered

          - Tooltip on the score card (too little space for a real explanation)
          - Modal popup (works but hard to link to directly)

          ## Additional Context

          The score formula is in `src/lib/score.ts`. It is 12 lines and can be shown clearly in a table. This page does not need a database call -- it is fully static content.

          > Read `DESIGN.md` before building the UI for this page.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[FEAT] Add a /score-explained page showing how the contributor score is calculated" \
            --label "enhancement" --label "frontend" --label "UI" \
            --label "help wanted" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "FEAT: Build out /explore leaderboard"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement

          The `/explore` page is currently a stub. The leaderboard is one of OSSfolio's core features and contributors want to see where they rank.

          ## Proposed Solution

          Build a leaderboard that:
          - Fetches the top 50 contributors by score from the `profiles` table in Supabase
          - Shows each contributor's rank, avatar (from GitHub), username, and score
          - Links each row to their OSSfolio profile page
          - Has a "Load more" button or pagination for results beyond the top 50

          ## Alternatives Considered

          - Filtering by language or organization (great for later, out of scope for v1)
          - Global username search (separate feature)

          ## Additional Context

          The `profiles` table has `id`, `username`, `score`, and other stats. The anon key can read it (check the RLS policies in the Supabase dashboard). The page to update is `src/app/explore/page.tsx`.

          > Read `DESIGN.md` before building the UI.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[FEAT] Build out the /explore leaderboard with top contributors" \
            --label "enhancement" --label "frontend" --label "backend" \
            --label "intermediate" --label "elusoc" \
            --body-file /tmp/body.md

      - name: "FEAT: Add dynamic OG images for profile pages"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement

          When someone shares an OSSfolio profile link on Twitter, LinkedIn, or Discord, the link preview shows no image. This makes the link look plain and misses a chance to highlight the user's contributor score.

          ## Proposed Solution

          Use Next.js `ImageResponse` (from `next/og`) to generate a dynamic Open Graph image for each profile page. The image should include:
          - The user's GitHub avatar
          - Their display name and username
          - Their contributor score
          - The OSSfolio logo and branding

          ## Alternatives Considered

          - A static OG image for all pages (easy but loses personalization entirely)

          ## Additional Context

          Next.js App Router supports this natively via an `opengraph-image.tsx` file placed inside the route folder. The dynamic data needed (username, score) is already fetched in `src/app/[username]/page.tsx`. Check the Next.js docs on dynamic OG image generation.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[FEAT] Add dynamic Open Graph images for profile pages" \
            --label "enhancement" --label "frontend" \
            --label "intermediate" --label "elusoc" \
            --body-file /tmp/body.md

