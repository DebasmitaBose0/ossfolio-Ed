name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  checks:
    name: checks
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate PR title (Conventional Commits)
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for console.log statements
        run: |
          if grep -r "console\.log" src/ --include="*.ts" --include="*.tsx"; then
            echo "ERROR: console.log found in src/. Remove before merging."
            exit 1
          fi
          echo "No console.log found."

      - name: Check branch name format
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" =~ ^(feat|fix|docs|refactor|chore|test|style|perf)/.+ ]]; then
            echo "Branch name OK: $BRANCH"
          else
            echo "ERROR: Branch '$BRANCH' does not follow naming convention."
            echo "Expected: feat/*, fix/*, docs/*, refactor/*, chore/*, test/*"
            exit 1
          fi
