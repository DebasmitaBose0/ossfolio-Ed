name: Auto-Merge Maintainer Approved PRs

on:
  pull_request_review:
    types: [submitted]

jobs:
  enable-auto-merge:
    if: github.event.review.state == 'approved' && github.event.review.user.login == 'PRODHOSH'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable Auto-Merge via GitHub CLI
        run: |
          gh pr merge "${{ github.event.pull_request.html_url }}" --auto --merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}