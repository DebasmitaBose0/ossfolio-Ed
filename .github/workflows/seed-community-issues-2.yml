name: Seed Community Issues — Batch 2
# Run manually once from the Actions tab to add new community issues.
# Check the Issues tab first — running again creates duplicates.
#
# Use the "batch" input to create just easy, just intermediate, or all at once.

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Which set of issues to create?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - easy-only
          - intermediate-only

permissions:
  issues: write

# ──────────────────────────────────────────────────────────────────────────────
# EASY ISSUES  (Good First Issues — beginner friendly)
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  easy-issues:
    name: Create Easy Issues
    if: ${{ inputs.batch == 'all' || inputs.batch == 'easy-only' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}

    steps:

      - name: Ensure labels exist
        run: |
          gh label create "good first issue" --color "7057ff" --description "Great for first-time contributors" --force --repo "$REPO" || true
          gh label create "bug"              --color "d73a4a" --description "Something isnt working"            --force --repo "$REPO" || true
          gh label create "enhancement"      --color "a2eeef" --description "New feature or improvement"        --force --repo "$REPO" || true
          gh label create "frontend"         --color "0075ca" --description "Related to UI / Next.js"           --force --repo "$REPO" || true
          gh label create "backend"          --color "e4e669" --description "Supabase / API / database"         --force --repo "$REPO" || true
          gh label create "UI"               --color "bfd4f2" --description "Visual / design changes"           --force --repo "$REPO" || true
          gh label create "help wanted"      --color "008672" --description "Open for anyone"                   --force --repo "$REPO" || true
          gh label create "beginner"         --color "2da44e" --description "Good for newcomers"                --force --repo "$REPO" || true
          gh label create "intermediate"     --color "fb8f44" --description "Some experience required"          --force --repo "$REPO" || true
          gh label create "documentation"    --color "0052cc" --description "Additions to docs"                 --force --repo "$REPO" || true
          gh label create "elusoc"           --color "7B2FBE" --description "ELUSOC project submission"         --force --repo "$REPO" || true

      # ── 1 ────────────────────────────────────────────────────────────────────

      - name: "BUG: Homepage hero shows ossfolio.me instead of ossfolio.qzz.io"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          The homepage hero section contains this text:

          > "Sign in once. Get a shareable profile at **ossfolio.me/username** showing your real open-source impact..."

          The actual domain is `ossfolio.qzz.io`, not `ossfolio.me`. Visitors who try to visit `ossfolio.me` will hit the wrong site.

          ## Steps to Reproduce
          1. Go to the homepage (ossfolio.qzz.io)
          2. Read the subtitle text under the main heading

          ## Expected Behavior

          The text reads `ossfolio.qzz.io/username`.

          ## Actual Behavior

          The text reads `ossfolio.me/username`.

          ## Additional Context

          File to edit: `src/components/home/Hero.tsx`, line 121.

          Change `ossfolio.me/username` to `ossfolio.qzz.io/username`. One line change.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[BUG] Homepage hero shows ossfolio.me instead of the real domain ossfolio.qzz.io" \
            --body-file /tmp/body.md \
            --label "bug" --label "frontend" --label "UI" \
            --label "beginner" --label "elusoc"
          sleep 2

      # ── 2 ────────────────────────────────────────────────────────────────────

      - name: "BUG: Navbar background flashes on initial dark mode load"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          When a user has dark mode saved in localStorage and loads any page, the navbar briefly renders in light mode before switching to dark. The page background renders dark immediately (because of a CSS class on `<html>`), but the navbar renders light until React hydrates. This creates a flash where the navbar and the page are noticeably different colors for a split second.

          ## Steps to Reproduce
          1. Enable dark mode and reload any page
          2. Watch the navbar carefully on load — it flashes light before going dark

          ## Expected Behavior

          The navbar matches the page background from the very first paint. No flash.

          ## Actual Behavior

          Navbar shows light background, then snaps to dark after ~100ms.

          ## Root Cause

          In `src/components/layout/Navbar.tsx`, the `isDarkMode` state initializes to `false` during SSR and the first render (because `window` is undefined). The `useLayoutEffect`/hydration pass then corrects it, but by then the browser has already painted the wrong color.

          ## Fix

          The standard solution is to add a small blocking `<script>` tag in `src/app/layout.tsx` (inside `<head>`) that reads `localStorage.getItem('theme')` and applies the `dark` class to `<html>` before React renders. This is the same technique Next.js docs recommend for dark mode without a flash.

          ## Environment
          - Reproducible on all browsers when dark mode preference is saved
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[BUG] Navbar flashes light background before dark mode loads on page refresh" \
            --body-file /tmp/body.md \
            --label "bug" --label "frontend" --label "UI" \
            --label "beginner" --label "elusoc"
          sleep 2

      # ── 3 ────────────────────────────────────────────────────────────────────

      - name: "BUG: Leaderboard nav link points to a broken anchor"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          The "Leaderboard" link in the main navbar generates `href="#leaderboard"`. This is an anchor that tries to scroll to a section on the current page, but no such section exists anywhere. Clicking it does nothing.

          The leaderboard lives at `/explore`. The nav link should point there directly.

          ## Steps to Reproduce
          1. Go to any page on the site
          2. Click "Leaderboard" in the top nav

          ## Expected Behavior

          User is taken to `/explore`.

          ## Actual Behavior

          Nothing happens. The URL changes to `<current-page>#leaderboard` but there is nothing to scroll to.

          ## Additional Context

          File to edit: `src/components/layout/Navbar.tsx`.

          The `navLinks` array uses `href="#leaderboard"` generated from the label string. "Leaderboard" should be a separate `<Link href="/explore">` instead of an auto-generated anchor.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[BUG] Leaderboard nav link goes to a broken anchor instead of /explore" \
            --body-file /tmp/body.md \
            --label "bug" --label "frontend" \
            --label "beginner" --label "elusoc"
          sleep 2

      # ── 4 ────────────────────────────────────────────────────────────────────

      - name: "BUG: Navbar Features and How It Works links break on non-homepage pages"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          The "Features" and "How it works" nav links use anchor hrefs: `#features` and `#how-it-works`. These scroll to sections on the homepage. But if you are on any other page (like `/saketh` or `/score-explained`) and click one of these links, the browser just appends the anchor to the current URL and nothing scrolls.

          ## Steps to Reproduce
          1. Visit any profile page like `/saketh`
          2. Click "Features" in the navbar

          ## Expected Behavior

          The browser navigates to the homepage and scrolls to the Features section.

          ## Actual Behavior

          The URL changes to `/saketh#features` but nothing happens.

          ## Fix

          Update the hrefs to use an absolute path from root: `/#features` and `/#how-it-works`. These work correctly from any page — they navigate home and scroll to the right section.

          File to edit: `src/components/layout/Navbar.tsx` — the `navLinks` array.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[BUG] Features and How It Works nav links only work on the homepage" \
            --body-file /tmp/body.md \
            --label "bug" --label "frontend" \
            --label "beginner" --label "elusoc"
          sleep 2

      # ── 5 ────────────────────────────────────────────────────────────────────

      - name: "GFI: Add language color dot to the Tech Stack section"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          The "Tech stack" section shows language names and repo counts as pill badges, but no color dot. The "Popular repositories" section already shows color-coded language dots (using the `LANG_COLORS` map defined in the same file). The Tech Stack badges should match this treatment.

          This is a small visual consistency fix — the data and the color map are already there.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx`
          - `LANG_COLORS` is defined around line 31 and maps language names to hex colors
          - The Tech Stack section is around line 449 — it renders pill-shaped `<span>` badges
          - Look at the repo cards (around line 367) to see exactly how the color dot is rendered there

          ## Steps to Complete
          1. Find the tech stack pill rendering in `ProfileView.tsx`
          2. Before the language name text, add a small 10×10 circle `<span>` with `backgroundColor: LANG_COLORS[language] ?? '#9a9a9a'`
          3. Match the gap and sizing style from the repo language dot

          ## Resources
          - Read `DESIGN.md` before touching any UI

          ## Definition of Done
          - [ ] Each Tech Stack badge has a colored dot matching the language color
          - [ ] Unknown languages show a neutral grey dot
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add language color dot to Tech Stack section badges" \
            --body-file /tmp/body.md \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc"
          sleep 2

      # ── 6 ────────────────────────────────────────────────────────────────────

      - name: "GFI: Update theme toggle aria-label to describe the next action"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          The dark/light mode toggle button has `aria-label="Toggle theme mode"`. This is vague — it does not tell a screen reader user what clicking will actually do.

          The correct pattern is to describe the action you are about to take: "Switch to dark mode" when the site is in light mode, and "Switch to light mode" when it is in dark mode. GitHub, VS Code, and most major products use this pattern.

          ## What You Need to Know
          - Relevant file: `src/components/layout/Navbar.tsx`, around line 189
          - The `isDarkMode` boolean state is already available in the component

          ## Steps to Complete
          1. Find the theme toggle button in `Navbar.tsx`
          2. Replace the static `aria-label="Toggle theme mode"` with a dynamic value:
             ```tsx
             aria-label={isDarkMode ? "Switch to light mode" : "Switch to dark mode"}
             ```

          ## Definition of Done
          - [ ] The aria-label describes what clicking the button will do, not just what it is
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Update theme toggle aria-label to describe the next action" \
            --body-file /tmp/body.md \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "beginner" --label "elusoc"
          sleep 2

      # ── 7 ────────────────────────────────────────────────────────────────────

      - name: "GFI: Add total forks count to the Contribution Stats grid"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          The Contribution Stats grid shows Commits, Pull Requests, Issues, Reviews, Stars, and Contributor Score. It does not show the total number of forks across all repositories. Forks are a meaningful signal that shows how many people found the work worth building on.

          The data is already in the `repos` array passed to `ProfileView`. You just need to sum it up and add a card.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx`
          - The stats grid is around line 417
          - Look at how `totalStars` is calculated at line 123 — do the same for `forks_count`

          ## Steps to Complete
          1. Below the `totalStars` line, add: `const totalForks = repos.reduce((sum, r) => sum + (r.forks_count ?? 0), 0);`
          2. Add `{ label: "Forks", value: totalForks }` to the stats array
          3. Check the grid looks OK with the extra card on mobile

          ## Resources
          - Read `DESIGN.md` before touching any UI

          ## Definition of Done
          - [ ] A "Forks" stat card appears in the stats grid
          - [ ] No layout regressions on mobile
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add total forks count to the Contribution Stats grid" \
            --body-file /tmp/body.md \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc"
          sleep 2

      # ── 8 ────────────────────────────────────────────────────────────────────

      - name: "GFI: Add a Score Explained link on the Contributor Score stat card"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          The Contributor Score card shows a number but gives no hint about what it means. There is already a `/score-explained` page that breaks down the formula clearly — but nothing on the profile links to it. Most users have no idea the page exists.

          Add a small "Score explained →" link below the label on the Contributor Score card.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx`
          - The stats grid is around line 417
          - The score card is the `{ label: "Contributor score", value: score }` entry
          - Use Next.js `<Link href="/score-explained">` for navigation

          ## Steps to Complete
          1. Find the stats grid in `ProfileView.tsx`
          2. Add special handling for the `label === "Contributor score"` card
          3. Below the label text, render a small `<Link>` styled as muted secondary text ("Score explained →")
          4. Other stat cards should be unaffected

          ## Resources
          - Read `DESIGN.md` for font sizes and color tokens

          ## Definition of Done
          - [ ] The Contributor Score card has a small "Score explained →" link
          - [ ] Clicking navigates to `/score-explained`
          - [ ] Other cards are unchanged
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add a Score Explained link on the Contributor Score stat card" \
            --body-file /tmp/body.md \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc"
          sleep 2

      # ── 9 ────────────────────────────────────────────────────────────────────

      - name: "GFI: Add month name labels above the contribution heatmap"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          The contribution heatmap is a grid of weekly columns but has no month labels. It is hard to tell which column is January vs June. GitHub, Wakatime, and similar tools all show abbreviated month names (Jan, Feb, Mar...) along the top of the heatmap.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx`, heatmap section around line 504
          - The `heatmap` prop is an array of week objects, each with a `days` array where each day has a `date` string (ISO format)
          - Use the first day of each week to check whether a new month starts that week

          ## Steps to Complete
          1. Before the heatmap grid, add a month labels row
          2. Loop through the weeks. For each week, check if its first day's month changed from the previous week
          3. If yes, render the abbreviated month name (Jan, Feb...) above that column; otherwise render an empty spacer
          4. Style as small muted text (`fontSize: 11px`, `color: var(--color-ink-mute)`)

          ## Resources
          - Read `DESIGN.md` for typography scale
          - GitHub's contribution graph is a great visual reference

          ## Definition of Done
          - [ ] Month labels appear above the correct heatmap columns
          - [ ] Labels do not overlap or overflow
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add month name labels above the contribution heatmap" \
            --body-file /tmp/body.md \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc"
          sleep 2

      # ── 10 ───────────────────────────────────────────────────────────────────

      - name: "GFI: Add smooth scroll behavior to the homepage"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          Clicking "Features" or "How it works" in the navbar while on the homepage jumps instantly to the section. There is no smooth animation. One CSS property fixes this and it is one of the smallest changes with the most visible polish impact.

          ## What You Need to Know
          - Relevant file: `src/app/globals.css`
          - The property is `scroll-behavior: smooth` on the `html` element

          ## Steps to Complete
          1. Open `src/app/globals.css`
          2. Find the `html` rule (or `:root`)
          3. Add `scroll-behavior: smooth;`
          4. Test: visit the homepage and click "How it works" — the scroll should now animate

          ## Definition of Done
          - [ ] Anchor link navigation scrolls smoothly
          - [ ] No other styles changed
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add smooth scroll behavior to homepage anchor navigation" \
            --body-file /tmp/body.md \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc"
          sleep 2

      # ── 11 ───────────────────────────────────────────────────────────────────

      - name: "GFI: Show total yearly GitHub contributions in the Stats Grid"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          GitHub shows the total contributions a person made in the last year right on their profile. OSSfolio fetches this number (`contributionCalendar.totalContributions`) from the API but never shows it anywhere on the page.

          Add a "Contributions" card to the stats grid.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx`, stats grid around line 417
          - The value is `stats.totalContributions` and is already passed into the component

          ## Steps to Complete
          1. Open the stats array in `ProfileView.tsx`
          2. Add `{ label: "Contributions", value: stats.totalContributions }` as a new entry
          3. Verify the number matches the GitHub yearly total on a few profiles
          4. Check the grid looks fine on mobile with the extra card

          ## Definition of Done
          - [ ] A "Contributions" card appears in the stats grid
          - [ ] The number matches GitHub's yearly total
          - [ ] No layout regressions on mobile
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Show total yearly GitHub contribution count in the Stats Grid" \
            --body-file /tmp/body.md \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc"
          sleep 2

      # ── 12 ───────────────────────────────────────────────────────────────────

      - name: "GFI: Add Facebook and Reddit share buttons on the profile page"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description

          The profile page already has "Share on X" and "Share on LinkedIn" buttons. A lot of developers and students also share on Facebook and Reddit (especially r/programming, r/opensource, r/cscareerquestions). Adding two more share buttons follows the exact same pattern as the existing ones.

          ## What You Need to Know
          - Relevant file: `src/components/profile/ProfileView.tsx` — the action buttons row around line 208
          - Facebook share URL: `https://www.facebook.com/sharer/sharer.php?u=<encoded URL>`
          - Reddit share URL: `https://www.reddit.com/submit?url=<encoded URL>&title=<encoded title>`
          - Copy the button style from the existing "Share on X" button exactly — same padding, same border, same hover effect

          ## Steps to Complete
          1. Find the action buttons row in `ProfileView.tsx`
          2. Add a Facebook share button after the LinkedIn button:
             - URL: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent('https://ossfolio.qzz.io/' + user.login)}`
             - Label: "Share on Facebook" with the Facebook `f` logo SVG
          3. Add a Reddit share button:
             - URL: `https://www.reddit.com/submit?url=${encodeURIComponent('https://ossfolio.qzz.io/' + user.login)}&title=${encodeURIComponent('My open source score on OSSfolio')}`
             - Label: "Share on Reddit" with the Reddit Snoo logo SVG
          4. Open each in a new tab using `window.open(..., '_blank', 'noopener,noreferrer')`

          ## Resources
          - Read `DESIGN.md` for button styles

          ## Definition of Done
          - [ ] Facebook and Reddit share buttons appear on the profile
          - [ ] Clicking each opens the correct share dialog in a new tab
          - [ ] Buttons are visually consistent with the existing share buttons
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[GOOD FIRST ISSUE] Add Facebook and Reddit share buttons to the profile page" \
            --body-file /tmp/body.md \
            --label "good first issue" --label "enhancement" --label "frontend" \
            --label "UI" --label "beginner" --label "elusoc"
          sleep 2

      # ── 13 ───────────────────────────────────────────────────────────────────

      - name: "BUG: Loading skeleton stats section shows 4 placeholder cards instead of 6"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          The profile loading skeleton renders the "Contribution stats" section with 4 placeholder cards. But the real `ProfileView.tsx` renders 6 stat cards (Commits, Pull Requests, Issues, Reviews, Stars, Contributor Score).

          This causes a visible layout shift when the real data loads — the section expands from 4 to 6 cards.

          ## Steps to Reproduce
          1. Visit any profile page on a throttled connection (DevTools → Slow 3G)
          2. Watch the stats section during loading — 4 cards
          3. After load completes — 6 cards, section jumps in size

          ## Fix

          File: `src/app/[username]/loading.tsx`

          Find `Array.from({ length: 4 })` in the Contribution stats section (around line 201) and change it to `Array.from({ length: 6 })`.
          ENDBODY
          gh issue create \
            --repo "$REPO" \
            --title "[BUG] Profile loading skeleton shows 4 stat cards but the real section has 6" \
            --body-file /tmp/body.md \
            --label "bug" --label "frontend" --label "UI" \
            --label "beginner" --label "elusoc"
          sleep 2

      - name: Done — Easy Issues
        run: echo "All easy issues created successfully."


# ──────────────────────────────────────────────────────────────────────────────
# INTERMEDIATE ISSUES
# ──────────────────────────────────────────────────────────────────────────────

  intermediate-issues:
    name: Create Intermediate Issues
    if: ${{ inputs.batch == 'all' || inputs.batch == 'intermediate-only' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}

    steps:

      - name: Ensure labels exist
        run: |
          gh label create "good first issue" --color "7057ff" --description "Great for first-time contributors" --force --repo "$REPO" || true
          gh label create "bug"              --color "d73a4a" --description "Something isnt working"            --force --repo "$REPO" || true
          gh label create "enhancement"      --color "a2eeef" --description "New feature or improvement"        --force --repo "$REPO" || true
          gh label create "frontend"         --color "0075ca" --description "Related to UI / Next.js"           --force --repo "$REPO" || true
          gh label create "backend"          --color "e4e669" --description "Supabase / API / database"         --force --repo "$REPO" || true
          gh label create "UI"               --color "bfd4f2" --description "Visual / design changes"           --force --repo "$REPO" || true
          gh label create "help wanted"      --color "008672" --description "Open for anyone"                   --force --repo "$REPO" || true
          gh label create "beginner"         --color "2da44e" --description "Good for newcomers"                --force --repo "$REPO" || true
          gh label create "intermediate"     --color "fb8f44" --description "Some experience required"          --force --repo "$REPO" || true
          gh label create "documentation"    --color "0052cc" --description "Additions to docs"                 --force --repo "$REPO" || true
          gh label create "elusoc"           --color "7B2FBE" --description "ELUSOC project submission"         --force --repo "$REPO" || true

      # ── 1 ────────────────────────────────────────────────────────────────────

      - name: "BUG: Contribution heatmap uses generated fake data instead of real GitHub data"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug

          The contribution heatmap on the profile page shows randomly generated fake activity data, not the user's real GitHub contributions. The function `generateMockHeatmap()` from `src/lib/mock.ts` seeds a random heatmap from the username string. This means every refresh and every user gets visually different but entirely fake data.

          The real contribution data is already fetched via the GitHub GraphQL API — `contributionCalendar.weeks[].contributionDays[]` contains the actual dates and counts. It is just not being used.

          ## Steps to Reproduce
          1. Visit any profile page
          2. Open the contribution heatmap section
          3. Refresh the page — the heatmap pattern changes slightly on each load (it shouldn't)

          ## Root Cause

          `src/app/[username]/page.tsx` line 69:
          ```ts
          const { weeks: heatmap, totalContributions } = generateMockHeatmap(username);
          ```
          This calls the mock generator instead of using the real data.

          ## Fix

          The real data lives in the REST API response from `fetchLiveStats()` in `src/lib/profile-data.ts`. That function currently fetches commits, PRs, issues, and reviews but does NOT fetch the contribution calendar.

          The fix requires two steps:
          1. In `src/lib/profile-data.ts`, add a fetch to the GitHub Events or Stats API to get real contribution data (or use the `/users/<login>/contributions` approach)
          2. In `src/app/[username]/page.tsx`, replace the `generateMockHeatmap(username)` call with the real calendar data, mapped to the `HeatmapWeek[]` format the component expects

