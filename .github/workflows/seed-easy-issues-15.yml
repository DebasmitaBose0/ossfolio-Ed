name: Create 15 More Easy OSSfolio Issues

on:
  workflow_dispatch:

jobs:
  create-more-easy-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: Ensure labels exist
        run: |
          gh label create "NEWBIE"      --color "2da44e" --force --repo "$REPO" || true
          gh label create "ELUSOC"      --color "7B2FBE" --force --repo "$REPO" || true
          gh label create "enhancement" --color "a2eeef" --force --repo "$REPO" || true
          gh label create "bug"         --color "d73a4a" --force --repo "$REPO" || true
          gh label create "frontend"    --color "0075ca" --force --repo "$REPO" || true
          gh label create "UI"          --color "bfd4f2" --force --repo "$REPO" || true
          gh label create "good first issue" --color "7057ff" --force --repo "$REPO" || true

      - name: "Issue 31"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          External links in the `Footer.tsx` are missing `rel="noopener noreferrer"`. This is a minor security and performance best practice when using `target="_blank"`.

          ## What You Need to Know
          - Relevant file(s): `src/components/layout/Footer.tsx`
          - Concepts involved: React security, anchor tags

          ## Steps to Complete
          1. Find all `<a>` tags in the Footer that link to external sites.
          2. Add `rel="noopener noreferrer"` to any tag that has `target="_blank"`.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Add rel=\"noopener noreferrer\" to external links in the Footer" --label "good first issue,NEWBIE,ELUSOC,enhancement,frontend" --body-file /tmp/body.md

      - name: "Issue 32"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          In `AuthModal.tsx`, we are using standard `<a>` tags for internal routing instead of Next.js `<Link>` components, which causes full page reloads.

          ## What You Need to Know
          - Relevant file(s): `src/components/auth/AuthModal.tsx`
          - Concepts involved: Next.js routing, `next/link`

          ## Steps to Complete
          1. Import `Link` from `next/link`.
          2. Replace `<a>` tags pointing to internal pages (like Terms of Service) with `<Link>`.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Replace <a> tags with Next.js Link in AuthModal" --label "good first issue,NEWBIE,ELUSOC,enhancement,frontend" --body-file /tmp/body.md

      - name: "Issue 33"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          A user's bio on their profile can stretch too wide on large screens, making it hard to read. We should constrain its maximum width.

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/ProfileView.tsx`
          - Concepts involved: Tailwind CSS, typography

          ## Steps to Complete
          1. Locate the bio text `p` tag in the user header section.
          2. Add `max-w-prose` or a specific `max-w-2xl` Tailwind class to constrain the width.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Add a max-width constraint to the profile bio text" --label "good first issue,NEWBIE,ELUSOC,UI,frontend" --body-file /tmp/body.md

      - name: "Issue 34"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          When a user clicks "Sign In", there is no visual feedback that the request is processing.

          ## What You Need to Know
          - Relevant file(s): `src/components/auth/AuthModal.tsx`
          - Concepts involved: React state, Lucide icons (`Loader2`)

          ## Steps to Complete
          1. Add an `isLoading` state when the button is clicked.
          2. If `isLoading` is true, show a spinning `Loader2` icon inside the button.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Add a loading spinner to the Sign In button" --label "good first issue,NEWBIE,ELUSOC,enhancement,frontend,UI" --body-file /tmp/body.md

      - name: "Issue 35"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          If a user has 0 merged PRs, `LatestMergedPRs.tsx` might look broken or empty. It needs a friendly "No merged PRs found" message.

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/LatestMergedPRs.tsx`
          - Concepts involved: Conditional rendering in React

          ## Steps to Complete
          1. Check if the PRs array is empty.
          2. Render a visually appealing fallback component (like a subtle card with an icon) instead of the list.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Improve empty state for LatestMergedPRs" --label "good first issue,NEWBIE,ELUSOC,enhancement,frontend,UI" --body-file /tmp/body.md

      - name: "Issue 36"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          The OSSfolio logo in the Navbar is missing an `alt` text attribute, which hurts accessibility and screen readers.

          ## What You Need to Know
          - Relevant file(s): `src/components/layout/Navbar.tsx`
          - Concepts involved: HTML accessibility, Next.js Image component

          ## Steps to Complete
          1. Find the `<Image>` or `<svg>` representing the logo.
          2. Add `alt="OSSfolio Logo"` or an equivalent accessible description.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Add missing alt text to the logo image in Navbar" --label "good first issue,NEWBIE,ELUSOC,bug,frontend" --body-file /tmp/body.md

      - name: "Issue 37"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          Sometimes the GitHub API returns languages in lowercase (e.g. `javascript`), but they should be properly capitalized as `JavaScript` in the Tech Stack section.

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/ProfileView.tsx` or `src/lib/languages.ts`
          - Concepts involved: String manipulation or mapping

          ## Steps to Complete
          1. Check how the language labels are rendered in the tech stack grid.
          2. Apply a capitalization function or map it to the correct display name.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Capitalize tech stack names in the Tech Stack section" --label "good first issue,NEWBIE,ELUSOC,bug,frontend" --body-file /tmp/body.md

      - name: "Issue 38"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          The rank numbers and user avatars in the `LeaderboardTable.tsx` are slightly misaligned vertically on some rows.

          ## What You Need to Know
          - Relevant file(s): `src/components/LeaderboardTable.tsx`
          - Concepts involved: Tailwind CSS Flexbox

          ## Steps to Complete
          1. Locate the row container in the leaderboard component.
          2. Ensure `items-center` is applied so the text and avatar align horizontally in the center.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Fix vertical alignment of avatars in the Leaderboard" --label "good first issue,NEWBIE,ELUSOC,bug,UI,frontend" --body-file /tmp/body.md

      - name: "Issue 39"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          Developers sometimes accidentally commit `.env.local.backup` or similar local test files.

          ## What You Need to Know
          - Relevant file(s): `.gitignore`
          - Concepts involved: Git configuration

          ## Steps to Complete
          1. Open the `.gitignore` file in the root.
          2. Add patterns for `*.backup`, `*.bak`, and `.env*` to ensure no sensitive files leak.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Update .gitignore to ignore backup and sensitive files" --label "good first issue,NEWBIE,ELUSOC,enhancement" --body-file /tmp/body.md

      - name: "Issue 40"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          We want to draw attention to the Contributor Score. It should have a quick pulse animation when the page first loads.

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/ProfileView.tsx`
          - Concepts involved: Tailwind animations

          ## Steps to Complete
          1. Add a custom short pulse animation in `tailwind.config.ts` (or just use `animate-pulse` temporarily).
          2. Apply it to the Contributor Score wrapper when it mounts.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Add an animated pulse to the Contributor Score" --label "good first issue,NEWBIE,ELUSOC,enhancement,UI,frontend" --body-file /tmp/body.md

      - name: "Issue 41"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          The profile location text (e.g. "San Francisco, CA") is a bit too small and hard to read.

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/ProfileView.tsx`
          - Concepts involved: Tailwind typography

          ## Steps to Complete
          1. Find the location icon and text in the profile header.
          2. Bump up the text size (e.g., from `text-xs` to `text-sm`).

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Increase font size of profile location text" --label "good first issue,NEWBIE,ELUSOC,bug,UI,frontend" --body-file /tmp/body.md

      - name: "Issue 42"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          If a user has 1,200 followers, it shows exactly `1200`. It would be cleaner to show `1.2k`.

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/ProfileView.tsx`
          - Concepts involved: Number formatting

          ## Steps to Complete
          1. Create a helper function `formatCount(num)`.
          2. If `num >= 1000`, divide by 1000 and append "k" with 1 decimal place.
          3. Apply this to followers/following count.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Format follower counts with 'k' suffix" --label "good first issue,NEWBIE,ELUSOC,enhancement,frontend" --body-file /tmp/body.md

      - name: "Issue 43"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          Disabled buttons in the app still show the default pointer or arrow cursor. They should indicate they are disabled via a `not-allowed` cursor.

          ## What You Need to Know
          - Relevant file(s): UI button components (e.g. `src/components/ui/button.tsx`)
          - Concepts involved: Tailwind classes, CSS cursors

          ## Steps to Complete
          1. Find the base Button component.
          2. Add the `disabled:cursor-not-allowed` Tailwind class.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Change cursor to not-allowed on disabled buttons" --label "good first issue,NEWBIE,ELUSOC,bug,UI,frontend" --body-file /tmp/body.md

      - name: "Issue 44"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          The repository cards in `ProfileReposSection.tsx` feel a little flat against the background. A subtle drop shadow would add depth.

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/ProfileReposSection.tsx`
          - Concepts involved: Tailwind shadows

          ## Steps to Complete
          1. Locate the container `div` for the individual repo card.
          2. Add a `shadow-sm` or `shadow-md` class, making sure it works in both light and dark modes.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Add a subtle drop shadow to repository cards" --label "good first issue,NEWBIE,ELUSOC,enhancement,UI,frontend" --body-file /tmp/body.md

      - name: "Issue 45"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          If a repository has a very long description, the card in `ProfileReposSection.tsx` stretches awkwardly.

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/ProfileReposSection.tsx`
          - Concepts involved: Tailwind text truncation, line-clamp

          ## Steps to Complete
          1. Find the paragraph tag rendering the repo description.
          2. Apply `line-clamp-2` or `line-clamp-3` to truncate text with an ellipsis (...) if it's too long.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Truncate long repository descriptions with an ellipsis" --label "good first issue,NEWBIE,ELUSOC,enhancement,UI,frontend" --body-file /tmp/body.md
