name: Create 30 OSSfolio Issues

on:
  workflow_dispatch:

jobs:
  create-more-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}

    steps:
      - name: Ensure labels exist
        run: |
          gh label create "NEWBIE"      --color "2da44e" --force --repo "$REPO" || true
          gh label create "ADVENTURER"  --color "fb8f44" --force --repo "$REPO" || true
          gh label create "VETERAN"     --color "d73a4a" --force --repo "$REPO" || true
          gh label create "ELUSOC"      --color "7B2FBE" --force --repo "$REPO" || true
          gh label create "enhancement" --color "a2eeef" --force --repo "$REPO" || true
          gh label create "bug"         --color "d73a4a" --force --repo "$REPO" || true
          gh label create "frontend"    --color "0075ca" --force --repo "$REPO" || true
          gh label create "backend"     --color "e4e669" --force --repo "$REPO" || true
          gh label create "UI"          --color "bfd4f2" --force --repo "$REPO" || true
          gh label create "database"    --color "b025a3" --force --repo "$REPO" || true
          gh label create "performance" --color "a5d6ff" --force --repo "$REPO" || true
          gh label create "good first issue" --color "7057ff" --force --repo "$REPO" || true

      # ── NEWBIE ISSUES (GOOD FIRST ISSUES) ────────────────────────────────────────────────────
      
      - name: "Issue 1"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          Currently, the `ProfileShareButtons.tsx` component is missing a Twitter/X share button. We want users to easily tweet out their OSSfolio score!

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/ProfileShareButtons.tsx`
          - Concepts involved: React components, Lucide icons

          ## Steps to Complete
          1. Add a Twitter/X icon using `lucide-react`.
          2. Link the button to `https://twitter.com/intent/tweet?text=Check out my open-source profile!...`
          3. Ensure it matches the styling of other buttons.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Add Twitter share button to ProfileShareButtons" --label "good first issue,NEWBIE,ELUSOC,enhancement,frontend,UI" --body-file /tmp/body.md

      - name: "Issue 2"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug
          The year navigation buttons in `HeatmapWithYearNav.tsx` can wrap awkwardly on very narrow mobile screens. They should be horizontally scrollable instead.

          ## Steps to Reproduce
          1. Open a profile page on a very narrow mobile viewport (e.g. iPhone SE).
          2. Observe the year buttons above the heatmap wrapping or squishing.

          ## Expected Behavior
          The buttons should stay in a single row and allow horizontal scrolling.

          ## Actual Behavior
          The flex container wraps them to multiple lines.

          ## Screenshots
          N/A

          ## Environment
          - OS: Any
          - Browser: Safari / Chrome mobile
          - Node version: 20.x

          ## Additional Context
          Fix this using Tailwind `flex-nowrap` and `overflow-x-auto`.
          ENDBODY
          gh issue create --repo "$REPO" --title "[BUG] Make year navigation horizontally scrollable on mobile" --label "bug,NEWBIE,ELUSOC,UI,frontend" --body-file /tmp/body.md

      - name: "Issue 3"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          The links in `Navbar.tsx` do not have clear hover states. This hurts interactivity.

          ## What You Need to Know
          - Relevant file(s): `src/components/layout/Navbar.tsx`
          - Concepts involved: Tailwind hover states

          ## Steps to Complete
          1. Locate the navigation `Link` tags.
          2. Add a Tailwind hover class like `hover:text-primary` or an underline effect.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Add hover states to Navbar links" --label "good first issue,NEWBIE,ELUSOC,enhancement,UI,frontend" --body-file /tmp/body.md

      - name: "Issue 4"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          In `ProfileView.tsx`, if a user has a score over 1,000, it looks like `1500` instead of `1,500`.

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/ProfileView.tsx`
          - Concepts involved: JavaScript Number formatting

          ## Steps to Complete
          1. Find where `score` is rendered in the stats grid.
          2. Format the number using `Intl.NumberFormat` or `.toLocaleString()`.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Format the Contributor Score with commas" --label "good first issue,NEWBIE,ELUSOC,enhancement,frontend" --body-file /tmp/body.md

      - name: "Issue 5"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          The program badges (like GSoC) in `ProfileView.tsx` look nice, but hovering over them provides no extra context.

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/ProfileView.tsx`
          - Concepts involved: Radix UI Tooltip

          ## Steps to Complete
          1. Wrap the rendered badge images with the Radix UI Tooltip component.
          2. Show the full name of the program on hover.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Add tooltips to Program Badges on Profile" --label "good first issue,NEWBIE,ELUSOC,enhancement,UI" --body-file /tmp/body.md

      - name: "Issue 6"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          If a user has 0 repositories, `ProfileReposSection.tsx` shows an empty screen or breaks. We need a friendly empty state.

          ## What You Need to Know
          - Relevant file(s): `src/components/profile/ProfileReposSection.tsx`
          - Concepts involved: Conditional React rendering

          ## Steps to Complete
          1. Add a check `if (repos.length === 0)`.
          2. Return a visually pleasing "No repositories found" message with an icon.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Improve empty state for ProfileReposSection" --label "good first issue,NEWBIE,ELUSOC,enhancement,frontend,UI" --body-file /tmp/body.md

      - name: "Issue 7"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          Users often want to contact the maintainers. We should have a "Copy Email" or "Contact Us" feature in `Footer.tsx`.

          ## What You Need to Know
          - Relevant file(s): `src/components/layout/Footer.tsx`
          - Concepts involved: Clipboard API, Toast notifications

          ## Steps to Complete
          1. Add an email icon to the footer links.
          2. Add a `onClick` handler that copies `support@ossfolio.com` to the clipboard.
          3. Show a toast notification.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Add copy email feature to the Footer" --label "good first issue,NEWBIE,ELUSOC,enhancement,frontend" --body-file /tmp/body.md

      - name: "Issue 8"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug
          In `HeatmapWithYearNav.tsx`, the unselected year buttons have poor contrast against the background in dark mode.

          ## Steps to Reproduce
          1. Switch to Dark Mode.
          2. View a profile heatmap.
          3. Notice the unselected year numbers are hard to read.

          ## Expected Behavior
          Text should be easily readable and pass WCAG contrast checks.

          ## Actual Behavior
          The gray color is too dark against the dark background.

          ## Screenshots
          N/A

          ## Environment
          - OS: Any
          - Browser: Any
          - Node version: 20.x

          ## Additional Context
          Adjust `color: "var(--color-ink-mute)"` in the component to a lighter gray in dark mode.
          ENDBODY
          gh issue create --repo "$REPO" --title "[BUG] Fix text contrast for year buttons in Heatmap" --label "bug,NEWBIE,ELUSOC,UI" --body-file /tmp/body.md

      - name: "Issue 9"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Task Description
          Our `not-found.tsx` page is too plain. Let's add a small, fun illustration to make getting a 404 less frustrating.

          ## What You Need to Know
          - Relevant file(s): `src/app/not-found.tsx`
          - Concepts involved: UI Design, SVGs

          ## Steps to Complete
          1. Add a relevant open-source graphic (like an SVG from Lucide).
          2. Center it above the "Page not found" text.

          ## Resources
          - If this touches UI: read [`DESIGN.md`](../../DESIGN.md) first — it has all colors, spacing, typography, and component specs

          ## Definition of Done
          - [ ] Task is complete
          - [ ] Tests pass (if applicable)
          - [ ] PR opened and linked to this issue
          ENDBODY
          gh issue create --repo "$REPO" --title "[GOOD FIRST ISSUE] Add illustration to 404 not-found page" --label "good first issue,NEWBIE,ELUSOC,enhancement,UI" --body-file /tmp/body.md

      - name: "Issue 10"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug
          If a user's GitHub avatar URL returns a 404, `Navbar.tsx` shows a broken image icon.

          ## Steps to Reproduce
          1. Login to the app.
          2. Simulate a failed image load for the avatar.
          3. The image shows a broken icon.

          ## Expected Behavior
          A fallback showing the user's initials should appear.

          ## Actual Behavior
          Broken image icon is displayed.

          ## Screenshots
          N/A

          ## Environment
          - OS: Any
          - Browser: Any
          - Node version: 20.x

          ## Additional Context
          Use `@radix-ui/react-avatar`'s `AvatarFallback` feature.
          ENDBODY
          gh issue create --repo "$REPO" --title "[BUG] Display fallback initials for User Avatar in Navbar" --label "bug,NEWBIE,ELUSOC,frontend" --body-file /tmp/body.md

      # ── ADVENTURER ISSUES ────────────────────────────────────────────────
      
      - name: "Issue 11"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          Users with a lot of repositories have a huge, unsearchable list in `ProfileReposSection.tsx`.

          ## Proposed Solution
          Add a text input at the top of the repos section to filter the `repos` array based on the search query (case-insensitive).

          ## Alternatives Considered
          No alternatives considered.

          ## Additional Context
          This should be client-side filtering since we already have all the repo data.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Implement search by repo name in ProfileReposSection" --label "ADVENTURER,ELUSOC,enhancement,frontend" --body-file /tmp/body.md

      - name: "Issue 12"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          `ContributionTimeline.tsx` currently loads all events at once. We need client-side pagination or a "Load More" button to avoid bloated pages.

          ## Proposed Solution
          Slice the initial timeline array to show only the first 10 items. Add a "Load More" button that reveals 10 more items per click.

          ## Alternatives Considered
          Virtual scrolling could work but is overkill for a timeline of this size.

          ## Additional Context
          This improves the initial render performance.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Add pagination to the ContributionTimeline" --label "ADVENTURER,ELUSOC,enhancement,frontend" --body-file /tmp/body.md

      - name: "Issue 13"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          Our Next.js API endpoints are vulnerable to spam. We need basic rate limiting.

          ## Proposed Solution
          Implement a rate-limiting utility (using Upstash Redis, or a simple in-memory Map for Vercel edge) and wrap core API routes to return `429 Too Many Requests`.

          ## Alternatives Considered
          Cloudflare WAF can also handle this, but application-level limits give us more granular control.

          ## Additional Context
          Check `src/app/api/` for endpoints.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Implement rate limiting middleware for API routes" --label "ADVENTURER,ELUSOC,enhancement,backend,security" --body-file /tmp/body.md

      - name: "Issue 14"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          Switching between tabs in `ProfileView.tsx` (like Repos, PRs, Timeline) is jarring.

          ## Proposed Solution
          Use Framer Motion to add a smooth crossfade or slide animation when switching tabs. Wrap the tab content in an `<AnimatePresence>`.

          ## Alternatives Considered
          CSS transitions, but Framer Motion is already in the package.json.

          ## Additional Context
          Keep the animation short (under 200ms) to feel snappy.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Add animated transitions between profile tabs" --label "ADVENTURER,ELUSOC,enhancement,UI,frontend" --body-file /tmp/body.md

      - name: "Issue 15"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          Users want to easily embed their OSSfolio stats in their GitHub `README.md`.

          ## Proposed Solution
          Add a "Copy Markdown" button in `ProfileShareButtons.tsx` that generates a markdown string containing their stats and link.

          ## Alternatives Considered
          An API route that returns an SVG card (another issue handles OG images).

          ## Additional Context
          Markdown should include standard badges.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Create a markdown export option" --label "ADVENTURER,ELUSOC,enhancement,frontend" --body-file /tmp/body.md

      - name: "Issue 16"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          Currently, `HeatmapWithYearNav.tsx` shows data based on a calendar year. It would be cool to have a "Last 365 Days" toggle.

          ## Proposed Solution
          Add a switch/toggle above the heatmap to dynamically slice the `weeks` array differently.

          ## Alternatives Considered
          N/A

          ## Additional Context
          This aligns with how GitHub defaults to the last year of activity.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Add toggle to Heatmap to show 365 days vs Calendar year" --label "ADVENTURER,ELUSOC,enhancement,frontend" --body-file /tmp/body.md

      - name: "Issue 17"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          When a user clicks a year in `HeatmapWithYearNav.tsx`, navigates away, and comes back, it resets to the current year.

          ## Proposed Solution
          Save the `selectedYear` state to `localStorage` when changed and initialize the state from it.

          ## Alternatives Considered
          Storing it in URL search params (e.g. `?year=2023`). This is also a good alternative.

          ## Additional Context
          Make sure to handle SSR hydration mismatches if using localStorage.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Persist the selected year in localStorage" --label "ADVENTURER,ELUSOC,enhancement,frontend" --body-file /tmp/body.md

      - name: "Issue 18"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          In `LatestMergedPRs.tsx`, we only show merged PRs. It would be helpful to let users see their Open and Closed PRs.

          ## Proposed Solution
          Add a filter dropdown (Merged / Open / Closed) and update the rendering logic based on the filter.

          ## Alternatives Considered
          Separate tabs for each PR status.

          ## Additional Context
          Requires updating the GitHub GraphQL query to fetch all PR states.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Filter PRs by status in LatestMergedPRs" --label "ADVENTURER,ELUSOC,enhancement,frontend" --body-file /tmp/body.md

      - name: "Issue 19"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          The leaderboard only shows total score. A "Most Improved" sort would highlight recent contributors.

          ## Proposed Solution
          Track historical score snapshots in the DB and calculate the delta over the last 30 days. Add a sort option in the UI.

          ## Alternatives Considered
          A separate page for "Trending" users.

          ## Additional Context
          Requires Supabase schema modifications and a cron job.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Add Most Improved sorting to the Leaderboard" --label "ADVENTURER,ELUSOC,enhancement,backend,database" --body-file /tmp/body.md

      - name: "Issue 20"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Describe the Bug
          If the GitHub API times out, the profile page completely crashes instead of failing gracefully.

          ## Steps to Reproduce
          1. Open a profile page.
          2. Simulate a network block or timeout for the GitHub API.
          3. Observe the Next.js server crash.

          ## Expected Behavior
          A graceful error page indicating the upstream API is slow.

          ## Actual Behavior
          500 Internal Server Error.

          ## Screenshots
          N/A

          ## Environment
          - OS: Any
          - Browser: Any
          - Node version: 20.x

          ## Additional Context
          Wrap the `fetch` in a timeout promise and handle the catch block properly.
          ENDBODY
          gh issue create --repo "$REPO" --title "[BUG] Handle network timeouts gracefully in data fetching" --label "bug,ADVENTURER,ELUSOC,backend" --body-file /tmp/body.md

      # ── VETERAN ISSUES ───────────────────────────────────────────────────
      
      - name: "Issue 21"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          GitHub's GraphQL API is slow. We are fetching raw data too frequently, burning through rate limits.

          ## Proposed Solution
          Set up a Redis instance (e.g. Upstash) to cache GraphQL responses for 1-2 hours keyed by username.

          ## Alternatives Considered
          PostgreSQL JSONB caching inside Supabase.

          ## Additional Context
          Look at `src/lib/github.ts` for integration points.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Implement Redis caching for GitHub API responses" --label "VETERAN,ELUSOC,performance,backend" --body-file /tmp/body.md

      - name: "Issue 22"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          When a profile link is shared, the Open Graph image is static.

          ## Proposed Solution
          Create an `/api/og` route using `@vercel/og` to dynamically draw the user's stats into an image buffer.

          ## Alternatives Considered
          Using a third-party OG generation service.

          ## Additional Context
          Update `layout.tsx` metadata to point to this new endpoint.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Create dynamic Open Graph image generation using @vercel/og" --label "VETERAN,ELUSOC,enhancement,backend" --body-file /tmp/body.md

      - name: "Issue 23"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          We have no automated browser tests. Refactors are dangerous.

          ## Proposed Solution
          Initialize Playwright in the repo and write E2E tests covering: Profile navigation, Leaderboard, and 404s.

          ## Alternatives Considered
          Cypress or Puppeteer.

          ## Additional Context
          Integrate this into GitHub Actions.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Setup Playwright E2E tests for core flows" --label "VETERAN,ELUSOC,testing" --body-file /tmp/body.md

      - name: "Issue 24"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          Fetching a huge profile blocks the server response (SSR). This creates a terrible TTFB.

          ## Proposed Solution
          Refactor data fetching so initial load only hits the DB. Offload the heavy GitHub GraphQL sync to a background queue.

          ## Alternatives Considered
          Keep doing it synchronously but increase caching limits.

          ## Additional Context
          This completely changes the data fetching architecture.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Refactor GitHub logic to use Background Queues" --label "VETERAN,ELUSOC,performance,backend" --body-file /tmp/body.md

      - name: "Issue 25"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          The app only tracks individuals. We want to support Teams/Organizations.

          ## Proposed Solution
          Write migration scripts to create `organizations` and `organization_members` tables. Build the UI to display Org leaderboards.

          ## Alternatives Considered
          N/A

          ## Additional Context
          Update RLS policies accordingly.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Migrate Supabase schema for Organization leaderboards" --label "VETERAN,ELUSOC,enhancement,database" --body-file /tmp/body.md

      - name: "Issue 26"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          Users could exploit the scoring system by spamming empty commits.

          ## Proposed Solution
          Build a heuristic system that flags accounts if they have unrealistic commit velocity and apply a shadowban.

          ## Alternatives Considered
          Manual moderation only.

          ## Additional Context
          Logic resides around `src/lib/score.ts`.

          > If this is a UI feature, the contributor working on it should read [`DESIGN.md`](../../DESIGN.md) before starting. It has all the color tokens, spacing, typography, and component specs used across the project.
          ENDBODY
          gh issue create --repo "$REPO" --title "[FEAT] Implement an Anomaly Detection system for scoring spikes" --label "VETERAN,ELUSOC,enhancement,backend" --body-file /tmp/body.md

      - name: "Issue 27"
        continue-on-error: true
        run: |
          cat > /tmp/body.md << 'ENDBODY'
          ## Problem Statement
          Other developers want to use our aggregated score data.

          ## Proposed Solution
